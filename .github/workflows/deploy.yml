name: Deploy to IONOS via FTP

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, libxml, sqlite3
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NPM Dependencies and Build
        run: |
          npm install
          npm run build

      - name: Deploy via lftp (SFTP)
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

          # Utilizamos lftp con el comando mirror (modo reverso para subir) a través del protocolo sftp://
          lftp -c "
          set sftp:auto-confirm yes;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} sftp://${{ secrets.FTP_SERVER }};
          mirror -R --verbose \
            --exclude-glob=.git/ \
            --exclude-glob=.github/ \
            --exclude-glob=node_modules/ \
            --exclude-glob=.env \
            --exclude-glob=storage/logs/ \
            --exclude-glob=storage/framework/cache/ \
            --exclude-glob=storage/framework/sessions/ \
            --exclude-glob=storage/framework/views/ \
            --exclude-glob=tests/ \
            ./ ${{ secrets.FTP_TARGET_DIR }}
          "
