name: Deploy to IONOS via FTP

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, libxml, sqlite3
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NPM Dependencies and Build
        run: |
          npm install
          npm run build

      - name: Deploy via lftp (SFTP)
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

          # Generamos el script de lftp usando Python para evitar cualquier error con caracteres especiales o espacios en las contraseñas
          python3 -c "
          import os

          username = os.environ.get('FTP_USERNAME', '')
          password = os.environ.get('FTP_PASSWORD', '')
          server = os.environ.get('FTP_SERVER', '')
          target = os.environ.get('FTP_TARGET_DIR', '')

          # Escapamos comillas y barras invertidas para lftp
          password_escaped = password.replace('\\\\', '\\\\\\\\').replace('\"', '\\\\\"')

          script = f\"\"\"
          set sftp:auto-confirm yes
          open -u \"{username}\",\"{password_escaped}\" sftp://{server}
          mirror -R --verbose \\
            --exclude-glob=.git/ \\
            --exclude-glob=.github/ \\
            --exclude-glob=node_modules/ \\
            --exclude-glob=.env \\
            --exclude-glob=storage/logs/ \\
            --exclude-glob=storage/framework/cache/ \\
            --exclude-glob=storage/framework/sessions/ \\
            --exclude-glob=storage/framework/views/ \\
            --exclude-glob=tests/ \\
            ./ \"{target}\"
          \"\"\"

          with open('deploy.lftp', 'w') as f:
              f.write(script)
          "

          # Ejecutamos el script seguro
          lftp -f deploy.lftp
