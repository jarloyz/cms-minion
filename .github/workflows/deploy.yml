name: Test and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, sqlite3, dom, filter, gd, json, libxml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: php artisan test --testsuite=Unit

  deploy:
    name: Continuous Deploy
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote Laravel directories
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          case "$DEPLOY_PATH" in
            ""|"/"|"/homepages"|"/homepages/"*"/"|"/.")
              echo "DEPLOY_PATH is missing or unsafe: '$DEPLOY_PATH'"
              exit 1
              ;;
          esac

          ssh -p "${SSH_PORT:-22}" "${SSH_USERNAME}@${SSH_HOST}" "
            mkdir -p '${DEPLOY_PATH}' \
              '${DEPLOY_PATH}/storage/framework/cache' \
              '${DEPLOY_PATH}/storage/framework/sessions' \
              '${DEPLOY_PATH}/storage/framework/views' \
              '${DEPLOY_PATH}/storage/logs' \
              '${DEPLOY_PATH}/bootstrap/cache'
          "

      - name: Sync project via rsync over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          case "$DEPLOY_PATH" in
            ""|"/"|"/homepages"|"/homepages/"*"/"|"/.")
              echo "DEPLOY_PATH is missing or unsafe: '$DEPLOY_PATH'"
              exit 1
              ;;
          esac

          rsync -az --checksum \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='vendor/' \
            --exclude='node_modules/' \
            --exclude='public/build/' \
            --exclude='.env' \
            --exclude='tests/' \
            --exclude='storage/logs/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            -e "ssh -p ${SSH_PORT:-22}" \
            ./ "${SSH_USERNAME}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Install dependencies and build on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USERNAME}@${SSH_HOST}" "
            cd '${DEPLOY_PATH}' &&
            mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache &&
            chmod -R 775 storage bootstrap/cache &&
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev &&
            if [ -f package-lock.json ]; then npm ci; else npm install; fi &&
            npm run build &&
            php artisan optimize:clear
          "
